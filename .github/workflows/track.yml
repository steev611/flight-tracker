name: track

on:
  schedule:
    # GHA cron is "at least every N min". 10 min is a sweet spot —
    # tighter than 5 (which GHA frequently delays beyond), enough resolution
    # for takeoff/landing alerts within ~15 min real-world.
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: track
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run tracker
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
        run: python tracker.py

      - name: Rebuild dashboard
        run: python build_dashboard.py

      - name: Commit state + dashboard if changed
        run: |
          git config user.name  "flight-tracker-bot"
          git config user.email "flight-tracker-bot@users.noreply.github.com"
          git add state.json flights/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "auto: tracker update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
