name: keepalive

# GitHub disables scheduled workflows in repos with no activity for 60 days.
# This bumps a heartbeat file once a week so track.yml never gets paused.

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name  "flight-tracker-bot"
          git config user.email "flight-tracker-bot@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%MZ" > .keepalive
          git add .keepalive
          git commit -m "keepalive"
          git push
